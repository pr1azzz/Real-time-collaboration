services:
  postgres:
    image: postgres:15
    container_name: task_manager_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "8082:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - task_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin4:
    image: dpage/pgadmin4:latest
    container_name: task_manager_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8083:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - task_network
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: task_manager_backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      FRONTEND_URL: http://localhost:8080
    ports:
      - "8081:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - task_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: task_manager_frontend
    ports:
      - "8080:3000"
    depends_on:
      - backend
    networks:
      - task_network
    # Убираем volumes для продакшен сборки

networks:
  task_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: